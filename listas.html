<html>
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista Encadeada Simples</title>
        <style>
            body {
                font-family: Arial;
                margin: 30px;
            }
            button {
                width: 150px;
            }
            input {
                width: 450px;
            }
            input, button {
                margin: 5px;
                padding: 8px;
            }
            #saida {
                margin-top: 20px;
                padding: 15px;
                border: 2px solid #555;
                border-radius: 5px;
            }
        
        </style>
    </head>
    <body>
        
        <h1>Lista Encadeada (versão Simples)</h1>
        <input type="text" id="nome" placeholder="Digite um nome">
       <br>
        <button onclick="adicionarFim()">Adicionar no Fim</button>
        <button onclick="adicionarInicio()">Adicionar no Início</button>
        <button onclick="removerInicio()">Remover Início</button>
       <br>
        <button onclick="contar()">Contar Elementos</button>
        <button onclick="buscar()">Buscar Nomes</button>
        <button onclick="mostrar()">Mostrar Lista</button>
       
        <div id="saida"></div>

        <script>
            //"Listas Encadeadas" simulada
            let valores = [];
            let proximo = [];

            let inicio = -1; // primeira execução = -1
            let ultimo = -1;

            function adicionarFim(){
                let nome  = document.getElementById("nome").value;
                if (nome === ""){
                    alert("Digite um nome");
                    return; // em vetor vazio é igual ao break
                }

                let novoIndice = valores.length;
                valores.push(nome);
                proximo.push(-1);
                if (inicio !== -1) {
                    proximo[ultimo] = novoIndice; // primeira execução somente
                    ultimo = novoIndice;
                } else {
                    inicio = novoIndice;
                    ultimo = novoIndice;
                
                }

                document.getElementById("nome").value = ""; // esvazia o campo
                mostrar();
            
            }

            function adicionarInicio(){
                let nome  = document.getElementById("nome").value;
                if (nome === ""){
                    alert("Digite um nome");
                    return; // em vetor vazio é igual ao break
                }

                let novoIndice = valores.length;
                valores.push(nome);
               
                proximo.push(inicio);
                inicio = novoIndice;
                if (ultimo === -1) {
                    ultimo = novoIndice;
                }
                

                document.getElementById("nome").value = ""; // esvazia o campo
                mostrar();
            
            }

            function contar() {
                let quantidade = 0;
                let atual = inicio;
                //conta ate encontrar o ultimo proximo (-1)
                while (atual !== -1) {
                    quantidade++;
                    atual = proximo[atual];
                }
                //mesmo que valores,length
                document.getElementById("saida").innerHTML = "Quantidade de elementos: "
                + quantidade;
            }
            
            function buscar() {
                let nomeBusca = document.getElementById("nome").value;
                if (nomeBusca === "") {
                    alert("Digite um nome");
                    return;
                }
                let atual = inicio;
                let encontrou = false;
                while (atual !== -1) {
                    if (valores[atual] === nomeBusca) {
                        encontrou = true;
                    }
                    atual = proximo[atual];
                }
                if (encontrou) {
                    document.getElementById("saida").innerHTML = "Nome encontrado na lista.";
                } else {
                    document.getElementById("saida").innerHTML = "Nome NÃO encontrado.";
                }
             }

            function removerInicio() {
                if (inicio === -1) {
                    alert("Lista Vazia");
                    return;
                }
                inicio = proximo[inicio];

                if (inicio === -1) {
                    ultimo = -1;
                }
                mostrar();
            }

            function mostrar(){
                let resultado = "";
                let atual = inicio; // atual vale -1 (primeira execução)
                while (atual !== -1){
                    resultado += valores[atual] + " → "; // resultado é um acumulador = pega o que tinha e soma com o novo
                    atual = proximo[atual];
                }
                if(inicio === -1) {
                    resultado = "Lista vazia";
                } else {
                    resultado += "null"; // cabo
                }
                document.getElementById("saida").innerHTML = resultado;
            }
        </script>

    </body>
    </html>
